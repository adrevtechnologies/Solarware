services:
  - type: web
    name: solarware-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: 'https://solarware.adrevtechnologies.com,https://*.adrevtechnologies.com'
