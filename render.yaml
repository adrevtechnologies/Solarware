services:
  - type: web
    name: solarware-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: '*'

  - type: static
    name: solarware-ui
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://solarware-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
